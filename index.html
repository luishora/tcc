<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Almoxarifado Pro</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons Library -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-zinc-100 font-inter antialiased">
  <div id="app">
    <!-- Content will be rendered here by script.js -->
    <div id="loading" class="min-h-screen flex items-center justify-center">
      <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500"></div>
    </div>
  </div>

  <!-- Lucide Icon Initialization Script -->
  <script>
    // Initial icons placeholder
    window.addEventListener('render-complete', () => {
      lucide.createIcons();
    });
  </script>
  <script src="script.js" type="module"></script>
</body>
</html>
