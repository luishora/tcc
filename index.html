<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Flow | Almoxarifado</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://jsdelivr.net"></script>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="logo">STOCK<span>FLOW</span></div>
            <ul class="nav-links">
                <li class="active" onclick="showSection('dashboard')">Dashboard</li>
                <li onclick="showSection('estoque')">Controle de Estoque</li>
                <li onclick="showSection('movimentacao')">Entradas / Saídas</li>
                <li onclick="showSection('auth')">Login / Cadastro</li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="content">
            <!-- Dashboard -->
            <section id="dashboard" class="section active">
                <header>
                    <h1>Dashboard de Visão Geral</h1>
                    <div id="alert-box" class="hidden">⚠️ Itens com nível crítico detectados!</div>
                </header>
                <div class="cards">
                    <div class="card"><h3>Total de Itens</h3><p id="total-itens">0</p></div>
                    <div class="card critical"><h3>Nível Crítico</h3><p id="total-critico">0</p></div>
                </div>
                <div class="chart-container">
                    <canvas id="stockChart"></canvas>
                </div>
            </section>

            <!-- Controle de Estoque -->
            <section id="estoque" class="section">
                <h1>Controle de Estoque</h1>
                <div class="filters">
                    <input type="text" id="filterInput" placeholder="Filtrar por nome..." onkeyup="filterTable()">
                    <select id="filterCategory" onchange="filterTable()">
                        <option value="">Todas Categorias</option>
                        <option value="Papelaria">Papelaria</option>
                        <option value="Escrita">Escrita</option>
                        <option value="Limpeza">Limpeza</option>
                    </select>
                </div>
                <table id="stockTable">
                    <thead>
                        <tr>
                            <th>Produto</th>
                            <th>Categoria</th>
                            <th>Qtd</th>
                            <th>Mínimo</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="stockBody"></tbody>
                </table>
            </section>

            <!-- Login/Cadastro -->
            <section id="auth" class="section">
                <div class="auth-container">
                    <div class="auth-box">
                        <h2>Acesso ao Sistema</h2>
                        <input type="email" placeholder="E-mail">
                        <input type="password" placeholder="Senha">
                        <button class="btn-primary">Entrar</button>
                        <p>Não tem conta? <a href="#">Cadastre-se</a></p>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
